name: Update README Assets

on:
  schedule:
    - cron: "0 0 * * *"   # runs once a day
  workflow_dispatch:        # lets you trigger it manually
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: mk-2007
          github_token: ${{ secrets.GITHUB_TOKEN }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Cache stats, streak, top-langs & activity graph
        run: |
          mkdir -p dist
          curl -sL "https://github-readme-stats.vercel.app/api?username=mk-2007&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=A78BFA&icon_color=A78BFA&text_color=c9d1d9&count_private=true" -o dist/stats.svg
          curl -sL "https://github-readme-streak-stats.herokuapp.com/?user=mk-2007&theme=tokyonight&hide_border=true&background=0d1117&ring=A78BFA&fire=A78BFA&currStreakLabel=A78BFA" -o dist/streak.svg
          curl -sL "https://github-readme-stats.vercel.app/api/top-langs/?username=mk-2007&layout=compact&theme=tokyonight&hide_border=true&bg_color=0d1117&title_color=A78BFA&text_color=c9d1d9" -o dist/top-langs.svg
          curl -sL "https://github-readme-activity-graph.vercel.app/graph?username=mk-2007&theme=tokyo-night&hide_border=true&bg_color=0d1117&color=A78BFA&line=A78BFA&point=ffffff&area=true" -o dist/activity-graph.svg

      - name: Push assets to the "output" branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
